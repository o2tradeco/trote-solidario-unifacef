        <title>Trote solidário 2026</title>

    <body>
        <nav class="menu container"> <!-- Menu de navegação -->
            <div class="nav-main">
                <h1>Trote 2026</h1>
                <div class="menu-itens">
                    <a href="index.html">Início</a>
                    <a href="introducao.html">Introdução</a>

                    <a href="cronograma.html">Cronograma</a>
                    <a href="calculadora.html">Calculadora</a>
                </div>
            </div>
        </nav>
        <header class="container">
            <div class="flex-column">
                <div class="banner">
                    <h2>Calculadora</h2>
                    <!-- <em>"Colecionando memórias de solidariedade"</em> -->
                </div>
            </div>
        </header>
        <main> <!-- Múltiplos sections dentro do main -->
            <section class="container">
                <div class="card-body">
                    <div class="form center">
                        <h2 class="h2-card form-header">
                            Calculadora de pontos
                        </h2>
                        <div class="dropdown">
                            <label for="colors">Selecionar equipe</label>
                            <select id="colors">
                                <option value="yellow">Amarela</option>
                                <option value="gray">Cinza</option>
                                <option value="orange">Laranja</option>
                                <option value="rouge">Bordo</option>
                                <option value="black">Preto</option>
                                <option value="pink">Rosa</option>
                                <option value="purple">Roxo</option>
                                <option value="green">Verde</option>
                                <option value="red">Vermelho</option>
                            </select>
                        </div>
                        <h3 class="h3-card form-header">
                            Simulação de metas batidas
                        </h3>
                        <form>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="qtdeArroz">Kit alimentos (60 kits)</label>
                                    <input type="number" id="qtdeKit" name="qtdeKit" min="0">
                                </div>
                                <div class="form-group">
                                    <label for="qtdeFeijao">Suplemento (30 latas)</label>
                                    <input type="number" id="qtdeSuplemento" name="qtdeSuplemento" min="0">
                                </div>
                            </div>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="qtdeArroz">Leite 1L (60 caixas)</label>
                                    <input type="number" id="qtdeLeite" name="qtdeLeite" min="0">
                                </div>
                                <div class="form-group">
                                    <label for="qtdeFeijao">Doação de sangue (30 doações)</label>
                                    <input type="number" id="qtdeSangue" name="qtdeSangue" min="0">
                                </div>
                            </div>
                            <h3 class="h3-card form-header">
                                Simulação intens avulsos
                            </h3>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="qtdeArroz">Arroz (5kg) - 10 pontos</label>
                                    <input type="number" id="qtdeArroz" name="qtdeArroz" min="0">
                                </div>
                                <div class="form-group">
                                    <label for="qtdeFeijao">Feijão (2kg) - 08 pontos</label>
                                    <input type="number" id="qtdeFeijao" name="qtdeFeijao" min="0">
                                </div>
                            </div>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="qtdeArroz">Óleo de Soja (1L) - 04 pontos</label>
                                    <input type="number" id="qtdeOleo" name="qtdeOleo" min="0">
                                </div>
                                <div class="form-group">
                                    <label for="qtdeFeijao">Pacote Macarrão (500g) - 02 pontos</label>
                                    <input type="text" id="qtdeMacarrao" name="qtdeMacarrao" min="0">
                                </div>
                            </div>
                            <button class="btn btn-primary" type="button" onclick="calcular()">
                                <h4 class="my-0 mx-0">
                                    Calcular pontos
                                </h4>
                            </button>
                        </form>
                        <div id="resultado" class="resultado">
                            <!-- O resultado da calculadora aparecerá aqui -->
                            <h4 class="mx-0 my-0 text-center">
                                Total de pontos: <span id="totalHoras">0</span> pontos
                            </h4>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <footer class="container">
            <p>Esse é o conteúdo da footer</p>
        </footer>
        <!-- Import Js -->
        <script src="./js/calculadora.js"></script>
    </body>
    <style>
        .card-body {
            width: fit-content;
            margin: -3rem auto 4rem auto;
        }
    </style>
</html>
